<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <h1>Gestor de Tareas</h1>
        <p class="app-subtitle">Organiza tus pendientes de forma sencilla.</p>
      </header>

      <main class="app-main">
        <section class="panel panel-auth" id="auth-section">
          <h2>Acceso</h2>
          <form id="login-form" class="form">
            <div class="form-group">
              <label for="username">Usuario</label>
              <input
                type="text"
                id="username"
                name="username"
                placeholder="Tu nombre"
                required
              />
            </div>
            <div class="form-group">
              <label for="password">Contraseña</label>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Tu contraseña"
                required
              />
            </div>
            <p class="helper-text">
              Admin de prueba: <strong>admin</strong> / <strong>admin123</strong>
            </p>
            <button type="submit" class="btn btn-primary">Entrar</button>
          </form>
        </section>

        <section class="panel panel-tasks is-hidden" id="tasks-section">
          <header class="panel-header">
            <div>
              <h2>Tus tareas</h2>
              <p id="current-user-label" class="current-user-label"></p>
            </div>
            <button id="logout-btn" class="btn btn-secondary">Cerrar sesión</button>
          </header>

          <section class="panel panel-new-task">
            <h3>Nueva tarea</h3>
            <form id="task-form" class="form">
              <div class="form-row">
                <div class="form-group">
                  <label for="title">Título</label>
                  <input
                    type="text"
                    id="title"
                    name="title"
                    placeholder="Ej: Comprar comida"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="dueDate">Fecha límite</label>
                  <input type="date" id="dueDate" name="dueDate" />
                </div>
                <div class="form-group">
                  <label for="priority">Prioridad</label>
                  <select id="priority" name="priority">
                    <option value="low">Baja</option>
                    <option value="medium" selected>Media</option>
                    <option value="high">Alta</option>
                  </select>
                </div>
                <div class="form-group is-hidden" id="assigneeGroup">
                  <label for="assignee">Usuario asignado</label>
                  <select id="assignee" name="assignee"></select>
                </div>
              </div>
              <div class="form-group">
                <label for="description">Descripción</label>
                <textarea
                  id="description"
                  name="description"
                  rows="3"
                  placeholder="Detalles adicionales..."
                ></textarea>
              </div>
              <button type="submit" class="btn btn-primary">Agregar tarea</button>
            </form>
          </section>

          <section class="panel panel-filters">
            <h3>Filtros</h3>
            <div class="filters">
              <div class="filters-group">
                <label for="statusFilter">Estado</label>
                <select id="statusFilter">
                  <option value="all" selected>Todas</option>
                  <option value="pending">Pendientes</option>
                  <option value="completed">Completadas</option>
                </select>
              </div>
              <div class="filters-group">
                <label for="priorityFilter">Prioridad</label>
                <select id="priorityFilter">
                  <option value="all" selected>Todas</option>
                  <option value="low">Baja</option>
                  <option value="medium">Media</option>
                  <option value="high">Alta</option>
                </select>
              </div>
              <div class="filters-group is-hidden" id="userFilterGroup">
                <label for="userFilter">Usuario</label>
                <select id="userFilter">
                  <option value="all" selected>Todos</option>
                </select>
              </div>
            </div>
          </section>

          <section class="panel panel-list">
            <h3>Lista de tareas</h3>
            <ul id="task-list" class="task-list"></ul>
            <p id="empty-state" class="empty-state">
              Aún no tienes tareas. Agrega la primera para empezar.
            </p>
          </section>

          <section class="panel panel-users is-hidden" id="users-section">
            <h3>Gestión de usuarios (solo admin)</h3>
            <form id="user-form" class="form">
              <div class="form-row">
                <div class="form-group">
                  <label for="newUsername">Usuario</label>
                  <input
                    type="text"
                    id="newUsername"
                    name="newUsername"
                    placeholder="Ej: maria"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="newPassword">Contraseña</label>
                  <input
                    type="password"
                    id="newPassword"
                    name="newPassword"
                    placeholder="Mínimo 4 caracteres"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="newRole">Rol</label>
                  <select id="newRole" name="newRole">
                    <option value="USER" selected>Usuario normal</option>
                    <option value="ADMIN">Administrador</option>
                  </select>
                </div>
              </div>
              <button type="submit" class="btn btn-secondary">
                Crear usuario
              </button>
            </form>
          </section>
        </section>
      </main>

      <footer class="app-footer">
        <small>Task Manager · Proyecto base en JavaScript</small>
      </footer>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
